<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan Digital</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--glow);
        }

        h2 { text-align: center; margin-bottom: 25px; }

        .total-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 1px solid var(--glass-border);
        }

        .money-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .money-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .money-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .history-section {
            margin-top: 30px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
        }

        .btn-delete {
            background: #ff4d4d;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-clear-all {
            background: #ff3e3e;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Modal Simple */
        #input-area {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            animation: fadeIn 0.3s;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-sizing: border-box;
        }

        .confirm-btn {
            width: 100%;
            padding: 12px;
            background: #4caf50;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Catatan Keuangan</h2>
    
    <div class="total-box">
        Total: Rp <span id="total-amount">0</span>
    </div>

    <div class="money-grid">
        <button class="money-btn" onclick="selectMoney(1000)">1.000</button>
        <button class="money-btn" onclick="selectMoney(2000)">2.000</button>
        <button class="money-btn" onclick="selectMoney(5000)">5.000</button>
        <button class="money-btn" onclick="selectMoney(10000)">10.000</button>
        <button class="money-btn" onclick="selectMoney(20000)">20.000</button>
        <button class="money-btn" onclick="selectMoney(50000)">50.000</button>
        <button class="money-btn" onclick="selectMoney(100000)">100.000</button>
    </div>

    <div id="input-area">
        <p id="selected-label">Jumlah lembar Rp 1.000:</p>
        <input type="number" id="qty-input" placeholder="Contoh: 9" min="1">
        <button class="confirm-btn" onclick="addTransaction()">Konfirmasi</button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h3>Riwayat</h3>
            <button class="btn-clear-all" onclick="clearAll()">Hapus Semua</button>
        </div>
        <ul id="history-list" class="history-list"></ul>
    </div>
</div>

<script>
    let currentNominal = 0;
    let transactions = JSON.parse(localStorage.getItem('my_money_data')) || [];

    function updateUI() {
        const list = document.getElementById('history-list');
        const totalDisplay = document.getElementById('total-amount');
        list.innerHTML = '';
        let total = 0;

        transactions.forEach((item, index) => {
            total += item.subtotal;
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <div>
                    <strong>Rp ${item.nominal.toLocaleString()}</strong> x ${item.qty}<br>
                    <small>Subtotal: Rp ${item.subtotal.toLocaleString()}</small>
                </div>
                <button class="btn-delete" onclick="deleteItem(${index})">Hapus</button>
            `;
            list.appendChild(li);
        });

        totalDisplay.innerText = total.toLocaleString();
        localStorage.setItem('my_money_data', JSON.stringify(transactions));
    }

    function selectMoney(val) {
        currentNominal = val;
        document.getElementById('selected-label').innerText = `Jumlah lembar Rp ${val.toLocaleString()}:`;
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('qty-input').focus();
    }

    function addTransaction() {
        const qty = parseInt(document.getElementById('qty-input').value);
        if (!qty || qty <= 0) {
            alert('Masukkan jumlah yang valid!');
            return;
        }

        const subtotal = currentNominal * qty;
        transactions.push({
            nominal: currentNominal,
            qty: qty,
            subtotal: subtotal
        });

        document.getElementById('qty-input').value = '';
        document.getElementById('input-area').style.display = 'none';
        updateUI();
    }

    function deleteItem(index) {
        transactions.splice(index, 1);
        updateUI();
    }

    function clearAll() {
        if (confirm('Apakah Anda yakin ingin menghapus SEMUA riwayat?')) {
            transactions = [];
            updateUI();
        }
    }

    // Inisialisasi awal
    updateUI();
</script>

</body>
</html>
